<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Infinite Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            background: #000;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #infinite-grid-menu-canvas {
            cursor: grab;
            width: 100%;
            height: 100%;
            display: block;
            outline: none;
        }

        #infinite-grid-menu-canvas:active {
            cursor: grabbing;
        }

    .face-title {
    user-select: none;
    position: absolute;
    font-weight: 800;
    font-size: 2.5rem; /* reduced size */
    color: #0fff;
    top: 50%;
    left: 3%; /* moved closer to left edge */
    transform: translate(0, -50%);
    pointer-events: none;
    opacity: 0;
    transition: 0.1s ease;
}


        .face-title.active {
            opacity: 1;
            transform: translate(0, -50%);
            pointer-events: auto;
            transition: 0.5s ease;
        }

        .face-description {
            user-select: none;
            position: absolute;
            max-width: 15ch;
            top: 50%;
            right: 10%;
            font-size: 1.5rem;
            color: #fff;
            transform: translate(0, -50%);
            pointer-events: none;
            opacity: 0;
            transition: 0.1s ease;
        }

        .face-description.active {
            opacity: 1;
            transform: translate(0, -50%);
            pointer-events: auto;
            transition: 0.5s ease;
        }

        .action-button {
            position: absolute;
            left: 50%;
            z-index: 10;
            width: 60px;
            height: 60px;
            display: grid;
            place-items: center;
            background: #0fff;
            border: 5px solid #000;
            border-radius: 50%;
            cursor: pointer;
            bottom: -80px;
            transform: translateX(-50%) scale(0);
            opacity: 0;
            pointer-events: none;
            transition: 0.1s ease;
        }

        .action-button.active {
            bottom: calc(5% + 80px);
            transform: translateX(-50%) scale(1);
            opacity: 1;
            pointer-events: auto;
            transition: 0.5s ease;
        }

        .action-button-icon {
            user-select: none;
            position: relative;
            color: #0f0f0f;
            top: 2px;
            font-size: 26px;
            margin: 0;
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            border-radius: 20px;
            padding: 0;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            position: relative;
            animation: slideUp 0.4s ease;
        }

        .modal-header {
            position: relative;
            width: 100%;
            height: 400px;
            overflow: hidden;
        }

        .modal-media {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-body {
            padding: 30px;
            color: #fff;
        }

        .modal-title {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 20px;
            white-space: nowrap; /* keep title on one line */
            color: #fff;
        }

        .modal-description {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #ccc;
            margin-bottom: 30px;
        }

        .modal-link {
            display: inline-block;
            padding: 12px 30px;
            background: #5227ff;
            color: #fff;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .modal-link:hover {
            background: #6b3aff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(82, 39, 255, 0.4);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #fff;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .close-modal:hover {
            background: rgba(0, 0, 0, 0.8);
            transform: rotate(90deg);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 1500px) {
            .face-title,
            .face-description {
                display: none;
            }
        }

.modal-media {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Ensure video controls are visible */
.modal-media::-webkit-media-controls {
    display: flex !important;
}

/* Dock Navigation Styles */
.material-symbols-outlined {
    font-variation-settings:
      'FILL' 0,
      'wght' 400,
      'GRAD' 0,
      'opsz' 24
}

.dock-outer {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  z-index: 9999;
}

.dock-panel {
  display: flex;
  align-items: flex-end;
  gap: 1rem;
  background: rgba(10, 10, 25, 0.9);
  border: 1px solid #222;
  border-radius: 1rem;
  padding: 0.5rem 1rem;
  backdrop-filter: blur(10px);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
}

.dock-item {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #060010;
  border: 1px solid #222;
  border-radius: 10px;
  width: 50px;
  height: 50px;
  cursor: pointer;
  transition: transform 0.2s ease;
  flex-direction: column;
  text-decoration: none;
}

.dock-item:hover {
  transform: scale(1.3);
}

.dock-item:hover .dock-icon {
  color: #00E0FF;
}

.dock-icon {
  color: #fff;
  font-size: 24px;
}

.dock-label {
  position: absolute;
  top: -1.8rem;
  left: 50%;
  transform: translateX(-50%);
  background: #060010;
  color: #fff;
  border: 1px solid #222;
  border-radius: 0.375rem;
  padding: 0.2rem 0.5rem;
  font-size: 0.75rem;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.2s ease, transform 0.2s ease;
}

.dock-item:hover .dock-label {
  opacity: 1;
  transform: translateX(-50%) translateY(-3px);
}

/* Navigation Dock Mobile Responsive Styles */
@media (max-width: 1024px) {
  .dock-panel {
    gap: 0.5rem;
    padding: 0.4rem 0.8rem;
  }
  
  .dock-item {
    width: 45px;
    height: 45px;
  }
  
  .dock-icon {
    font-size: 22px;
  }
}

@media (max-width: 768px) {
  .dock-panel {
    gap: 0.3rem;
    padding: 0.3rem 0.6rem;
  }
  
  .dock-item {
    width: 40px;
    height: 40px;
  }
  
  .dock-icon {
    font-size: 20px;
  }
  
  .dock-label {
    font-size: 0.65rem;
  }
}

    </style>
</head>
<body>
    <div id="container">
        <canvas id="infinite-grid-menu-canvas"></canvas>
        <h2 class="face-title" id="title"></h2>
        <p class="face-description" id="description"></p>
        <div class="action-button" id="actionBtn">
            <p class="action-button-icon">&#x2197;</p>
        </div>

        <!-- Modal -->
        <div class="modal" id="modal">
            <div class="modal-content">
                <div class="close-modal" id="closeModal">✕</div>
                <div class="modal-header">
                    <img id="modalMedia" class="modal-media" src="" alt="">
                </div>
                <div class="modal-body">
                    <h2 class="modal-title" id="modalTitle"></h2>
                    <p class="modal-description" id="modalDescription"></p>
                    <a class="modal-link" id="modalLink"></a>
                </div>
            </div>
        </div>
    </div>

    <!-- Load gl-matrix from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gl-matrix/2.8.1/gl-matrix-min.js"></script>
    
    <script>
        // Wait for everything to load
        window.addEventListener('load', function() {
            
        // Check if gl-matrix loaded
        if (typeof glMatrix === 'undefined') {
            console.error('gl-matrix library failed to load!');
            document.body.innerHTML = '<div style="color: white; padding: 20px;">Error: gl-matrix library failed to load. Please check your internet connection.</div>';
            return;
        }

        // Extract the modules from glMatrix
        let mat4, vec2, vec3, quat;
        
        if (glMatrix.mat4) {
            mat4 = glMatrix.mat4;
            vec2 = glMatrix.vec2;
            vec3 = glMatrix.vec3;
            quat = glMatrix.quat;
        } else if (window.mat4) {
            mat4 = window.mat4;
            vec2 = window.vec2;
            vec3 = window.vec3;
            quat = window.quat;
        }

        if (!mat4 || !vec3 || !vec2 || !quat) {
            console.error('Failed to load gl-matrix modules');
            document.body.innerHTML = '<div style="color: white; padding: 20px;">Error: Failed to initialize gl-matrix.</div>';
            return;
        }

        // Configuration
        const items = [
            {
                image: 'images/innv/baticon.jpeg',
                title: 'Custom Li-ion Battery',
                description: 'Lightweight power. Extended endurance',
                detailedDescription: 'Our custom 4S Li-ion battery delivers 5600mAh capacity with 13C rating, providing 12.92 minutes of flight time. Engineered to be significantly lighter than conventional LiPo batteries while maintaining superior energy density and thermal management. Eco-conscious design with extended cycle life reduces replacement frequency and operational costs.',
                mediaType: 'image',
                mediaUrl: 'videos/innv/bat.mp4'
            },
            {
                image: 'images/innv/pcbicon.jpeg',
                title: 'Custom PDB & BEC',
                description: 'Integrated power. Zero complexity.',
                detailedDescription: 'Custom-designed Power Distribution Board seamlessly integrates into the quadcopter\'s compact layout. Dual BEC system delivers stable 5V for flight controller and 12V for camera, telemetry, and payload mechanism. Direct bullet connector integration eliminates external wiring, while integrated mounting holes ensure secure installation and reliable power distribution.',
                mediaType: 'image',
                mediaUrl: 'videos/innv/pcb.mp4'
            },
            {
                image: 'images/innv/icon.png',
                title: 'Electromagnetic<br>Payload Release',
                description: 'Precise drop. Zero mechanical failure.',
                detailedDescription: 'Innovative electromagnetic actuation system eliminates servo complexity and mechanical wear. Operates at 12V with instant demagnetization for controlled mid-air payload release. MOSFET-based custom switch with H-bridge driver ensures reliable triggering. Faster response time and superior accuracy compared to traditional servo mechanisms.',
                mediaType: 'image',
                mediaUrl: 'videos/innv/payload.mp4'
            },
        ];

        // Shaders
        const discVertShaderSource = `#version 300 es

        uniform mat4 uWorldMatrix;
        uniform mat4 uViewMatrix;
        uniform mat4 uProjectionMatrix;
        uniform vec3 uCameraPosition;
        uniform vec4 uRotationAxisVelocity;

        in vec3 aModelPosition;
        in vec3 aModelNormal;
        in vec2 aModelUvs;
        in mat4 aInstanceMatrix;

        out vec2 vUvs;
        out float vAlpha;
        flat out int vInstanceId;

        #define PI 3.141593

        void main() {
            vec4 worldPosition = uWorldMatrix * aInstanceMatrix * vec4(aModelPosition, 1.);
            vec3 centerPos = (uWorldMatrix * aInstanceMatrix * vec4(0., 0., 0., 1.)).xyz;
            float radius = length(centerPos.xyz);

            if (gl_VertexID > 0) {
                vec3 rotationAxis = uRotationAxisVelocity.xyz;
                float rotationVelocity = min(.15, uRotationAxisVelocity.w * 15.);
                vec3 stretchDir = normalize(cross(centerPos, rotationAxis));
                vec3 relativeVertexPos = normalize(worldPosition.xyz - centerPos);
                float strength = dot(stretchDir, relativeVertexPos);
                float invAbsStrength = min(0., abs(strength) - 1.);
                strength = rotationVelocity * sign(strength) * abs(invAbsStrength * invAbsStrength * invAbsStrength + 1.);
                worldPosition.xyz += stretchDir * strength;
            }

            worldPosition.xyz = radius * normalize(worldPosition.xyz);
            gl_Position = uProjectionMatrix * uViewMatrix * worldPosition;
            vAlpha = smoothstep(0.5, 1., normalize(worldPosition.xyz).z) * .9 + .1;
            vUvs = aModelUvs;
            vInstanceId = gl_InstanceID;
        }`;

        const discFragShaderSource = `#version 300 es
        precision highp float;

        uniform sampler2D uTex;
        uniform int uItemCount;
        uniform int uAtlasSize;

        out vec4 outColor;
        in vec2 vUvs;
        in float vAlpha;
        flat in int vInstanceId;

        void main() {
            int itemIndex = vInstanceId % uItemCount;
            int cellsPerRow = uAtlasSize;
            int cellX = itemIndex % cellsPerRow;
            int cellY = itemIndex / cellsPerRow;
            vec2 cellSize = vec2(1.0) / vec2(float(cellsPerRow));
            vec2 cellOffset = vec2(float(cellX), float(cellY)) * cellSize;

            ivec2 texSize = textureSize(uTex, 0);
            float imageAspect = float(texSize.x) / float(texSize.y);
            float containerAspect = 1.0;
            float scale = max(imageAspect / containerAspect, containerAspect / imageAspect);
            
            vec2 st = vec2(vUvs.x, 1.0 - vUvs.y);
            st = (st - 0.5) * scale + 0.5;
            st = clamp(st, 0.0, 1.0);
            st = st * cellSize + cellOffset;
            
            outColor = texture(uTex, st);
            outColor.a *= vAlpha;
        }`;

        // Geometry Classes
        class Face {
            constructor(a, b, c) {
                this.a = a;
                this.b = b;
                this.c = c;
            }
        }

        class Vertex {
            constructor(x, y, z) {
                this.position = vec3.fromValues(x, y, z);
                this.normal = vec3.create();
                this.uv = vec2.create();
            }
        }

        class Geometry {
            constructor() {
                this.vertices = [];
                this.faces = [];
            }

            addVertex(...args) {
                for (let i = 0; i < args.length; i += 3) {
                    this.vertices.push(new Vertex(args[i], args[i + 1], args[i + 2]));
                }
                return this;
            }

            addFace(...args) {
                for (let i = 0; i < args.length; i += 3) {
                    this.faces.push(new Face(args[i], args[i + 1], args[i + 2]));
                }
                return this;
            }

            get lastVertex() {
                return this.vertices[this.vertices.length - 1];
            }

            subdivide(divisions = 1) {
                const midPointCache = {};
                let f = this.faces;

                for (let div = 0; div < divisions; ++div) {
                    const newFaces = new Array(f.length * 4);
                    f.forEach((face, ndx) => {
                        const mAB = this.getMidPoint(face.a, face.b, midPointCache);
                        const mBC = this.getMidPoint(face.b, face.c, midPointCache);
                        const mCA = this.getMidPoint(face.c, face.a, midPointCache);

                        const i = ndx * 4;
                        newFaces[i + 0] = new Face(face.a, mAB, mCA);
                        newFaces[i + 1] = new Face(face.b, mBC, mAB);
                        newFaces[i + 2] = new Face(face.c, mCA, mBC);
                        newFaces[i + 3] = new Face(mAB, mBC, mCA);
                    });
                    f = newFaces;
                }

                this.faces = f;
                return this;
            }

            spherize(radius = 1) {
                this.vertices.forEach(vertex => {
                    vec3.normalize(vertex.normal, vertex.position);
                    vec3.scale(vertex.position, vertex.normal, radius);
                });
                return this;
            }

            get data() {
                return {
                    vertices: this.vertexData,
                    indices: this.indexData,
                    normals: this.normalData,
                    uvs: this.uvData
                };
            }

            get vertexData() {
                return new Float32Array(this.vertices.flatMap(v => Array.from(v.position)));
            }

            get normalData() {
                return new Float32Array(this.vertices.flatMap(v => Array.from(v.normal)));
            }

            get uvData() {
                return new Float32Array(this.vertices.flatMap(v => Array.from(v.uv)));
            }

            get indexData() {
                return new Uint16Array(this.faces.flatMap(f => [f.a, f.b, f.c]));
            }

            getMidPoint(ndxA, ndxB, cache) {
                const cacheKey = ndxA < ndxB ? `k_${ndxB}_${ndxA}` : `k_${ndxA}_${ndxB}`;
                if (Object.prototype.hasOwnProperty.call(cache, cacheKey)) {
                    return cache[cacheKey];
                }
                const a = this.vertices[ndxA].position;
                const b = this.vertices[ndxB].position;
                const ndx = this.vertices.length;
                cache[cacheKey] = ndx;
                this.addVertex((a[0] + b[0]) * 0.5, (a[1] + b[1]) * 0.5, (a[2] + b[2]) * 0.5);
                return ndx;
            }
        }

        class IcosahedronGeometry extends Geometry {
            constructor() {
                super();
                const t = Math.sqrt(5) * 0.5 + 0.5;
                this.addVertex(-1, t, 0, 1, t, 0, -1, -t, 0, 1, -t, 0, 0, -1, t, 0, 1, t, 0, -1, -t, 0, 1, -t, t, 0, -1, t, 0, 1, -t, 0, -1, -t, 0, 1)
                    .addFace(0, 11, 5, 0, 5, 1, 0, 1, 7, 0, 7, 10, 0, 10, 11, 1, 5, 9, 5, 11, 4, 11, 10, 2, 10, 7, 6, 7, 1, 8, 3, 9, 4, 3, 4, 2, 3, 2, 6, 3, 6, 8, 3, 8, 9, 4, 9, 5, 2, 4, 11, 6, 2, 10, 8, 6, 7, 9, 8, 1);
            }
        }

        class DiscGeometry extends Geometry {
            constructor(steps = 4, radius = 1) {
                super();
                steps = Math.max(4, steps);
                const alpha = (2 * Math.PI) / steps;

                this.addVertex(0, 0, 0);
                this.lastVertex.uv[0] = 0.5;
                this.lastVertex.uv[1] = 0.5;

                for (let i = 0; i < steps; ++i) {
                    const x = Math.cos(alpha * i);
                    const y = Math.sin(alpha * i);
                    this.addVertex(radius * x, radius * y, 0);
                    this.lastVertex.uv[0] = x * 0.5 + 0.5;
                    this.lastVertex.uv[1] = y * 0.5 + 0.5;

                    if (i > 0) {
                        this.addFace(0, i, i + 1);
                    }
                }
                this.addFace(0, steps, 1);
            }
        }

        // WebGL Helper Functions
        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            const success = gl.getShaderParameter(shader, gl.COMPILE_STATUS);
            if (success) return shader;
            console.error('Shader compilation error:', gl.getShaderInfoLog(shader));
            gl.deleteShader(shader);
            return null;
        }

        function createProgram(gl, shaderSources, attribLocations) {
            const program = gl.createProgram();
            [gl.VERTEX_SHADER, gl.FRAGMENT_SHADER].forEach((type, ndx) => {
                const shader = createShader(gl, type, shaderSources[ndx]);
                if (shader) gl.attachShader(program, shader);
            });

            if (attribLocations) {
                for (const attrib in attribLocations) {
                    gl.bindAttribLocation(program, attribLocations[attrib], attrib);
                }
            }

            gl.linkProgram(program);
            const success = gl.getProgramParameter(program, gl.LINK_STATUS);
            if (success) return program;
            console.error('Program linking error:', gl.getProgramInfoLog(program));
            gl.deleteProgram(program);
            return null;
        }

        function makeBuffer(gl, sizeOrData, usage) {
            const buf = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, buf);
            gl.bufferData(gl.ARRAY_BUFFER, sizeOrData, usage);
            gl.bindBuffer(gl.ARRAY_BUFFER, null);
            return buf;
        }

        function makeVertexArray(gl, bufLocNumElmPairs, indices) {
            const va = gl.createVertexArray();
            gl.bindVertexArray(va);

            for (const [buffer, loc, numElem] of bufLocNumElmPairs) {
                if (loc === -1) continue;
                gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
                gl.enableVertexAttribArray(loc);
                gl.vertexAttribPointer(loc, numElem, gl.FLOAT, false, 0, 0);
            }

            if (indices) {
                const indexBuffer = gl.createBuffer();
                gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, indexBuffer);
                gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(indices), gl.STATIC_DRAW);
            }

            gl.bindVertexArray(null);
            return va;
        }

        function resizeCanvasToDisplaySize(canvas) {
            const dpr = Math.min(2, window.devicePixelRatio);
            const displayWidth = Math.round(canvas.clientWidth * dpr);
            const displayHeight = Math.round(canvas.clientHeight * dpr);
            const needResize = canvas.width !== displayWidth || canvas.height !== displayHeight;
            if (needResize) {
                canvas.width = displayWidth;
                canvas.height = displayHeight;
            }
            return needResize;
        }

        function createAndSetupTexture(gl, minFilter, magFilter, wrapS, wrapT) {
            const texture = gl.createTexture();
            gl.bindTexture(gl.TEXTURE_2D, texture);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, wrapS);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, wrapT);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, minFilter);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, magFilter);
            return texture;
        }

        // Arcball Control
        class ArcballControl {
            constructor(canvas, updateCallback) {
                this.canvas = canvas;
                this.updateCallback = updateCallback || (() => null);
                this.isPointerDown = false;
                this.orientation = quat.create();
                this.pointerRotation = quat.create();
                this.rotationVelocity = 0;
                this.rotationAxis = vec3.fromValues(1, 0, 0);
                this.snapDirection = vec3.fromValues(0, 0, -1);
                this.snapTargetDirection = null;
                this.EPSILON = 0.1;
                this.IDENTITY_QUAT = quat.create();
                this.pointerPos = vec2.create();
                this.previousPointerPos = vec2.create();
                this._rotationVelocity = 0;
                this._combinedQuat = quat.create();

                canvas.addEventListener('pointerdown', e => {
                    vec2.set(this.pointerPos, e.clientX, e.clientY);
                    vec2.copy(this.previousPointerPos, this.pointerPos);
                    this.isPointerDown = true;
                });
                canvas.addEventListener('pointerup', () => {
                    this.isPointerDown = false;
                });
                canvas.addEventListener('pointerleave', () => {
                    this.isPointerDown = false;
                });
                canvas.addEventListener('pointermove', e => {
                    if (this.isPointerDown) {
                        vec2.set(this.pointerPos, e.clientX, e.clientY);
                    }
                });

                canvas.style.touchAction = 'none';
            }

            update(deltaTime, targetFrameDuration = 16) {
                const timeScale = deltaTime / targetFrameDuration + 0.00001;
                let angleFactor = timeScale;
                let snapRotation = quat.create();

                if (this.isPointerDown) {
                    const INTENSITY = 0.3 * timeScale;
                    const ANGLE_AMPLIFICATION = 5 / timeScale;

                    const midPointerPos = vec2.sub(vec2.create(), this.pointerPos, this.previousPointerPos);
                    vec2.scale(midPointerPos, midPointerPos, INTENSITY);

                    if (vec2.sqrLen(midPointerPos) > this.EPSILON) {
                        vec2.add(midPointerPos, this.previousPointerPos, midPointerPos);

                        const p = this.project(midPointerPos);
                        const q = this.project(this.previousPointerPos);
                        const a = vec3.normalize(vec3.create(), p);
                        const b = vec3.normalize(vec3.create(), q);

                        vec2.copy(this.previousPointerPos, midPointerPos);
                        angleFactor *= ANGLE_AMPLIFICATION;
                        this.quatFromVectors(a, b, this.pointerRotation, angleFactor);
                    } else {
                        quat.slerp(this.pointerRotation, this.pointerRotation, this.IDENTITY_QUAT, INTENSITY);
                    }
                } else {
                    const INTENSITY = 0.1 * timeScale;
                    quat.slerp(this.pointerRotation, this.pointerRotation, this.IDENTITY_QUAT, INTENSITY);

                    if (this.snapTargetDirection) {
                        const SNAPPING_INTENSITY = 0.2;
                        const a = this.snapTargetDirection;
                        const b = this.snapDirection;
                        const sqrDist = vec3.squaredDistance(a, b);
                        const distanceFactor = Math.max(0.1, 1 - sqrDist * 10);
                        angleFactor *= SNAPPING_INTENSITY * distanceFactor;
                        this.quatFromVectors(a, b, snapRotation, angleFactor);
                    }
                }

                const combinedQuat = quat.multiply(quat.create(), snapRotation, this.pointerRotation);
                this.orientation = quat.multiply(quat.create(), combinedQuat, this.orientation);
                quat.normalize(this.orientation, this.orientation);

                const RA_INTENSITY = 0.8 * timeScale;
                quat.slerp(this._combinedQuat, this._combinedQuat, combinedQuat, RA_INTENSITY);
                quat.normalize(this._combinedQuat, this._combinedQuat);

                const rad = Math.acos(this._combinedQuat[3]) * 2.0;
                const s = Math.sin(rad / 2.0);
                let rv = 0;
                if (s > 0.000001) {
                    rv = rad / (2 * Math.PI);
                    this.rotationAxis[0] = this._combinedQuat[0] / s;
                    this.rotationAxis[1] = this._combinedQuat[1] / s;
                    this.rotationAxis[2] = this._combinedQuat[2] / s;
                }

                const RV_INTENSITY = 0.5 * timeScale;
                this._rotationVelocity += (rv - this._rotationVelocity) * RV_INTENSITY;
                this.rotationVelocity = this._rotationVelocity / timeScale;

                this.updateCallback(deltaTime);
            }

            quatFromVectors(a, b, out, angleFactor = 1) {
                const axis = vec3.cross(vec3.create(), a, b);
                vec3.normalize(axis, axis);
                const d = Math.max(-1, Math.min(1, vec3.dot(a, b)));
                const angle = Math.acos(d) * angleFactor;
                quat.setAxisAngle(out, axis, angle);
                return { q: out, axis, angle };
            }

            project(pos) {
                const r = 2;
                const w = this.canvas.clientWidth;
                const h = this.canvas.clientHeight;
                const s = Math.max(w, h) - 1;

                const x = (2 * pos[0] - w - 1) / s;
                const y = (2 * pos[1] - h - 1) / s;
                let z = 0;
                const xySq = x * x + y * y;
                const rSq = r * r;

                if (xySq <= rSq / 2.0) {
                    z = Math.sqrt(rSq - xySq);
                } else {
                    z = rSq / Math.sqrt(xySq);
                }
                return vec3.fromValues(-x, y, z);
            }
        }

        // Main Menu Class
        class InfiniteGridMenu {
            constructor(canvas, items, onActiveItemChange, onMovementChange) {
                this.TARGET_FRAME_DURATION = 1000 / 60;
                this.SPHERE_RADIUS = 2;
                this.time = 0;
                this.deltaTime = 0;
                this.deltaFrames = 0;
                this.frames = 0;
                this.smoothRotationVelocity = 0;
                this.movementActive = false;
                
                this.canvas = canvas;
                this.items = items || [];
                this.onActiveItemChange = onActiveItemChange;
                this.onMovementChange = onMovementChange;

                this.camera = {
                    matrix: mat4.create(),
                    near: 0.1,
                    far: 40,
                    fov: Math.PI / 4,
                    aspect: 1,
                    position: vec3.fromValues(0, 0, 3),
                    up: vec3.fromValues(0, 1, 0),
                    matrices: {
                        view: mat4.create(),
                        projection: mat4.create()
                    }
                };

                this.init();
            }

            init() {
                this.gl = this.canvas.getContext('webgl2', { antialias: true, alpha: false });
                const gl = this.gl;
                
                if (!gl) {
                    console.error('WebGL2 not supported');
                    alert('Your browser does not support WebGL2. Please try a different browser or enable WebGL.');
                    return;
                }

                this.discProgram = createProgram(gl, [discVertShaderSource, discFragShaderSource], {
                    aModelPosition: 0,
                    aModelNormal: 1,
                    aModelUvs: 2,
                    aInstanceMatrix: 3
                });

                if (!this.discProgram) {
                    console.error('Failed to create shader program');
                    return;
                }

                this.discLocations = {
                    aModelPosition: gl.getAttribLocation(this.discProgram, 'aModelPosition'),
                    aModelUvs: gl.getAttribLocation(this.discProgram, 'aModelUvs'),
                    aInstanceMatrix: gl.getAttribLocation(this.discProgram, 'aInstanceMatrix'),
                    uWorldMatrix: gl.getUniformLocation(this.discProgram, 'uWorldMatrix'),
                    uViewMatrix: gl.getUniformLocation(this.discProgram, 'uViewMatrix'),
                    uProjectionMatrix: gl.getUniformLocation(this.discProgram, 'uProjectionMatrix'),
                    uCameraPosition: gl.getUniformLocation(this.discProgram, 'uCameraPosition'),
                    uRotationAxisVelocity: gl.getUniformLocation(this.discProgram, 'uRotationAxisVelocity'),
                    uTex: gl.getUniformLocation(this.discProgram, 'uTex'),
                    uItemCount: gl.getUniformLocation(this.discProgram, 'uItemCount'),
                    uAtlasSize: gl.getUniformLocation(this.discProgram, 'uAtlasSize')
                };

                this.discGeo = new DiscGeometry(56, 1);
                this.discBuffers = this.discGeo.data;
                this.discVAO = makeVertexArray(
                    gl,
                    [
                        [makeBuffer(gl, this.discBuffers.vertices, gl.STATIC_DRAW), this.discLocations.aModelPosition, 3],
                        [makeBuffer(gl, this.discBuffers.uvs, gl.STATIC_DRAW), this.discLocations.aModelUvs, 2]
                    ],
                    this.discBuffers.indices
                );

                this.icoGeo = new IcosahedronGeometry();
                this.icoGeo.subdivide(1).spherize(this.SPHERE_RADIUS);
                this.instancePositions = this.icoGeo.vertices.map(v => v.position);
                this.DISC_INSTANCE_COUNT = this.icoGeo.vertices.length;
                this.initDiscInstances(this.DISC_INSTANCE_COUNT);

                this.worldMatrix = mat4.create();
                this.initTexture();
                this.control = new ArcballControl(this.canvas, deltaTime => this.onControlUpdate(deltaTime));

                this.updateCameraMatrix();
                this.updateProjectionMatrix(gl);
                this.resize();
            }

            initTexture() {
                const gl = this.gl;
                this.tex = createAndSetupTexture(gl, gl.LINEAR, gl.LINEAR, gl.CLAMP_TO_EDGE, gl.CLAMP_TO_EDGE);

                const itemCount = Math.max(1, this.items.length);
                this.atlasSize = Math.ceil(Math.sqrt(itemCount));
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const cellSize = 512;

                canvas.width = this.atlasSize * cellSize;
                canvas.height = this.atlasSize * cellSize;
                
                ctx.fillStyle = '#333';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                gl.bindTexture(gl.TEXTURE_2D, this.tex);
                gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, canvas);
                gl.generateMipmap(gl.TEXTURE_2D);

                Promise.all(
                    this.items.map(item =>
                        new Promise(resolve => {
                            const img = new Image();
                            img.crossOrigin = 'anonymous';
                            img.onload = () => resolve(img);
                            img.onerror = () => {
                                console.warn('Failed to load image:', item.image);
                                resolve(null);
                            };
                            img.src = item.image;
                        })
                    )
                ).then(images => {
                    images.forEach((img, i) => {
                        if (img) {
                            const x = (i % this.atlasSize) * cellSize;
                            const y = Math.floor(i / this.atlasSize) * cellSize;
                            ctx.drawImage(img, x, y, cellSize, cellSize);
                        }
                    });

                    gl.bindTexture(gl.TEXTURE_2D, this.tex);
                    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, canvas);
                    gl.generateMipmap(gl.TEXTURE_2D);
                });
            }

            initDiscInstances(count) {
                const gl = this.gl;
                this.discInstances = {
                    matricesArray: new Float32Array(count * 16),
                    matrices: [],
                    buffer: gl.createBuffer()
                };

                for (let i = 0; i < count; ++i) {
                    const instanceMatrixArray = new Float32Array(this.discInstances.matricesArray.buffer, i * 16 * 4, 16);
                    instanceMatrixArray.set(mat4.create());
                    this.discInstances.matrices.push(instanceMatrixArray);
                }

                gl.bindVertexArray(this.discVAO);
                gl.bindBuffer(gl.ARRAY_BUFFER, this.discInstances.buffer);
                gl.bufferData(gl.ARRAY_BUFFER, this.discInstances.matricesArray.byteLength, gl.DYNAMIC_DRAW);

                const mat4AttribSlotCount = 4;
                const bytesPerMatrix = 16 * 4;
                for (let j = 0; j < mat4AttribSlotCount; ++j) {
                    const loc = this.discLocations.aInstanceMatrix + j;
                    gl.enableVertexAttribArray(loc);
                    gl.vertexAttribPointer(loc, 4, gl.FLOAT, false, bytesPerMatrix, j * 4 * 4);
                    gl.vertexAttribDivisor(loc, 1);
                }

                gl.bindBuffer(gl.ARRAY_BUFFER, null);
                gl.bindVertexArray(null);
            }

            animate(deltaTime) {
                const gl = this.gl;
                this.control.update(deltaTime, this.TARGET_FRAME_DURATION);

                let positions = this.instancePositions.map(p => 
                    vec3.transformQuat(vec3.create(), p, this.control.orientation)
                );

                const scale = 0.25;
                const SCALE_INTENSITY = 0.6;

                positions.forEach((p, ndx) => {
                    const s = (Math.abs(p[2]) / this.SPHERE_RADIUS) * SCALE_INTENSITY + (1 - SCALE_INTENSITY);
                    const finalScale = s * scale;
                    const matrix = mat4.create();
                    
                    mat4.multiply(matrix, matrix, mat4.fromTranslation(mat4.create(), vec3.negate(vec3.create(), p)));
                    mat4.multiply(matrix, matrix, mat4.targetTo(mat4.create(), [0, 0, 0], p, [0, 1, 0]));
                    mat4.multiply(matrix, matrix, mat4.fromScaling(mat4.create(), [finalScale, finalScale, finalScale]));
                    mat4.multiply(matrix, matrix, mat4.fromTranslation(mat4.create(), [0, 0, -this.SPHERE_RADIUS]));

                    mat4.copy(this.discInstances.matrices[ndx], matrix);
                });

                gl.bindBuffer(gl.ARRAY_BUFFER, this.discInstances.buffer);
                gl.bufferSubData(gl.ARRAY_BUFFER, 0, this.discInstances.matricesArray);
                gl.bindBuffer(gl.ARRAY_BUFFER, null);

                this.smoothRotationVelocity = this.control.rotationVelocity;
            }

            render() {
                const gl = this.gl;
                gl.useProgram(this.discProgram);
                gl.enable(gl.CULL_FACE);
                gl.enable(gl.DEPTH_TEST);
                gl.clearColor(0, 0, 0, 1);
                gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

                gl.uniformMatrix4fv(this.discLocations.uWorldMatrix, false, this.worldMatrix);
                gl.uniformMatrix4fv(this.discLocations.uViewMatrix, false, this.camera.matrices.view);
                gl.uniformMatrix4fv(this.discLocations.uProjectionMatrix, false, this.camera.matrices.projection);
                gl.uniform3f(this.discLocations.uCameraPosition, this.camera.position[0], this.camera.position[1], this.camera.position[2]);
                gl.uniform4f(this.discLocations.uRotationAxisVelocity, this.control.rotationAxis[0], this.control.rotationAxis[1], this.control.rotationAxis[2], this.smoothRotationVelocity * 1.1);
                gl.uniform1i(this.discLocations.uItemCount, this.items.length);
                gl.uniform1i(this.discLocations.uAtlasSize, this.atlasSize);
                gl.uniform1i(this.discLocations.uTex, 0);
                
                gl.activeTexture(gl.TEXTURE0);
                gl.bindTexture(gl.TEXTURE_2D, this.tex);
                gl.bindVertexArray(this.discVAO);
                gl.drawElementsInstanced(gl.TRIANGLES, this.discBuffers.indices.length, gl.UNSIGNED_SHORT, 0, this.DISC_INSTANCE_COUNT);
            }

            updateCameraMatrix() {
                mat4.targetTo(this.camera.matrix, this.camera.position, [0, 0, 0], this.camera.up);
                mat4.invert(this.camera.matrices.view, this.camera.matrix);
            }

            updateProjectionMatrix(gl) {
                this.camera.aspect = gl.canvas.clientWidth / gl.canvas.clientHeight;
                const height = this.SPHERE_RADIUS * 0.35;
                const distance = this.camera.position[2];
                
                if (this.camera.aspect > 1) {
                    this.camera.fov = 2 * Math.atan(height / distance);
                } else {
                    this.camera.fov = 2 * Math.atan(height / this.camera.aspect / distance);
                }
                
                mat4.perspective(this.camera.matrices.projection, this.camera.fov, this.camera.aspect, this.camera.near, this.camera.far);
            }

            onControlUpdate(deltaTime) {
                const timeScale = deltaTime / this.TARGET_FRAME_DURATION + 0.0001;
                let damping = 5 / timeScale;
                let cameraTargetZ = 3;

                const isMoving = this.control.isPointerDown || Math.abs(this.smoothRotationVelocity) > 0.01;

                if (isMoving !== this.movementActive) {
                    this.movementActive = isMoving;
                    this.onMovementChange(isMoving);
                }

                if (!this.control.isPointerDown) {
                    const nearestVertexIndex = this.findNearestVertexIndex();
                    const itemIndex = nearestVertexIndex % Math.max(1, this.items.length);
                    this.onActiveItemChange(itemIndex);
                    const snapDirection = vec3.normalize(vec3.create(), this.getVertexWorldPosition(nearestVertexIndex));
                    this.control.snapTargetDirection = snapDirection;
                } else {
                    cameraTargetZ += this.control.rotationVelocity * 80 + 2.5;
                    damping = 7 / timeScale;
                }

                this.camera.position[2] += (cameraTargetZ - this.camera.position[2]) / damping;
                this.updateCameraMatrix();
            }

            findNearestVertexIndex() {
                const n = this.control.snapDirection;
                const inversOrientation = quat.conjugate(quat.create(), this.control.orientation);
                const nt = vec3.transformQuat(vec3.create(), n, inversOrientation);

                let maxD = -1;
                let nearestVertexIndex;
                for (let i = 0; i < this.instancePositions.length; ++i) {
                    const d = vec3.dot(nt, this.instancePositions[i]);
                    if (d > maxD) {
                        maxD = d;
                        nearestVertexIndex = i;
                    }
                }
                return nearestVertexIndex;
            }

            getVertexWorldPosition(index) {
                const nearestVertexPos = this.instancePositions[index];
                return vec3.transformQuat(vec3.create(), nearestVertexPos, this.control.orientation);
            }

            resize() {
                const gl = this.gl;
                const needsResize = resizeCanvasToDisplaySize(gl.canvas);
                if (needsResize) {
                    gl.viewport(0, 0, gl.drawingBufferWidth, gl.drawingBufferHeight);
                }
                this.updateProjectionMatrix(gl);
            }

            run(time = 0) {
                this.deltaTime = Math.min(32, time - this.time);
                this.time = time;
                this.deltaFrames = this.deltaTime / this.TARGET_FRAME_DURATION;
                this.frames += this.deltaFrames;

                this.animate(this.deltaTime);
                this.render();

                requestAnimationFrame(t => this.run(t));
            }
        }

        // Initialize
        const canvas = document.getElementById('infinite-grid-menu-canvas');
        const titleEl = document.getElementById('title');
        const descEl = document.getElementById('description');
        const actionBtn = document.getElementById('actionBtn');
        let currentActiveItem = null;

        const handleActiveItem = (index) => {
            currentActiveItem = items[index];
            titleEl.innerHTML = currentActiveItem.title;
            descEl.innerHTML = currentActiveItem.description;
        };

        const handleMovement = (isMoving) => {
            if (isMoving) {
                titleEl.classList.remove('active');
                descEl.classList.remove('active');
                actionBtn.classList.remove('active');
            } else {
                titleEl.classList.add('active');
                descEl.classList.add('active');
                actionBtn.classList.add('active');
            }
        };

       // Modal functionality
actionBtn.addEventListener('click', () => {
    if (currentActiveItem) {
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modalTitle');
        const modalDescription = document.getElementById('modalDescription');
        const modalMediaContainer = document.querySelector('.modal-header');
        const modalLink = document.getElementById('modalLink');
        
        // Remove line breaks from title
        modalTitle.textContent = currentActiveItem.title.replace(/<br\s*\/?>/gi, ' ');
        
        // Clean description
        let cleanDescription = currentActiveItem.detailedDescription 
            ? currentActiveItem.detailedDescription.replace(/<br\s*\/?>/gi, ' ')
            : currentActiveItem.description;
        modalDescription.textContent = cleanDescription;
        
        // Handle media (video or image)
        const mediaUrl = currentActiveItem.mediaUrl || currentActiveItem.image;
        const isVideo = mediaUrl.match(/\.(mp4|webm|ogg)$/i);
        
        // Clear previous media
        modalMediaContainer.innerHTML = '';
        
        if (isVideo) {
            // Create video element
            modalMediaContainer.innerHTML = `
                <video class="modal-media" autoplay loop muted playsinline controls>
                    <source src="${mediaUrl}" type="video/mp4">
                    Your browser does not support video.
                </video>
            `;
        } else {
            // Create image element
            modalMediaContainer.innerHTML = `
                <img class="modal-media" src="${mediaUrl}" alt="${currentActiveItem.title}">
            `;
        }
        
        // Hide link (or set it if needed)
        modalLink.style.display = 'none';
        modalLink.removeAttribute('href');
        
        // Show modal
        modal.classList.add('active');
    }
});


        // Close modal handlers
        document.getElementById('closeModal').addEventListener('click', () => {
            document.getElementById('modal').classList.remove('active');
        });

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') {
                document.getElementById('modal').classList.remove('active');
            }
        });

        // Close modal on ESC key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('modal').classList.remove('active');
            }
        });

        try {
            const menu = new InfiniteGridMenu(canvas, items, handleActiveItem, handleMovement);
            menu.run();
            window.addEventListener('resize', () => menu.resize());
        } catch (error) {
            console.error('Error initializing menu:', error);
            document.body.innerHTML = '<div style="color: white; padding: 20px;">Error initializing 3D menu. Check console for details.<br><br>' + error.message + '</div>';
        }

        }); // End of window load event
    </script>
