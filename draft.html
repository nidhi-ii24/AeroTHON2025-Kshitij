<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mechanical 2D Draft</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0a0a0a;
            overflow: hidden;
            height: 100vh;
        }

        /* Main Container - adjusted for dock and logo */
        .viewer-container {
            position: fixed;
            top: 100px;
            bottom: 100px;
            left: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Top Title Bar */
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .nav-title {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00E0FF, #00bcd4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Image Container */
        .image-wrapper {
            flex: 1;
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            padding: 20px;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .main-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 10px;
            transition: transform 0.3s ease;
            cursor: grab;
        }

        .main-image:active {
            cursor: grabbing;
        }

        /* Floating Control Panel - Right Side */
        .floating-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: rgba(0, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #00FFFF;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .control-btn:hover {
            background: rgba(0, 255, 255, 0.3);
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 255, 255, 0.4);
        }

        /* Zoom Controls - Bottom Left */
        .zoom-controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            padding: 12px 20px;
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            z-index: 100;
        }

        .zoom-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: rgba(0, 255, 255, 0.15);
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #00FFFF;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .zoom-btn:hover {
            background: rgba(0, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .zoom-level {
            color: #00FFFF;
            font-weight: 600;
            min-width: 60px;
            text-align: center;
            font-size: 0.95rem;
        }

       .dock-outer {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  z-index: 9999;
}

.dock-panel {
  display: flex;
  align-items: flex-end;
  gap: 1rem;
  background: rgba(10, 10, 25, 0.9);
  border: 1px solid #222;
  border-radius: 1rem;
  padding: 0.5rem 1rem;
  backdrop-filter: blur(10px);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
}

.dock-item {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #060010;
  border: 1px solid #222;
  border-radius: 10px;
  width: 50px;
  height: 50px;
  cursor: pointer;
  transition: transform 0.2s ease;
  flex-direction: column;
}

.dock-item:hover {
  transform: scale(1.3);
}

.dock-item:hover .dock-icon {
  color: #00E0FF;
}

.dock-icon {
  color: #fff;
  font-size: 24px;
}

.dock-label {
  position: absolute;
  top: -1.8rem;
  left: 50%;
  transform: translateX(-50%);
  background: #060010;
  color: #fff;
  border: 1px solid #222;
  border-radius: 0.375rem;
  padding: 0.2rem 0.5rem;
  font-size: 0.75rem;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.2s ease, transform 0.2s ease;
}

.dock-item:hover .dock-label {
  opacity: 1;
  transform: translateX(-50%) translateY(-3px);
}
/* Fixed Logo in Top Right Corner - Clean Version */
.fixed-logo {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
    transition: all 0.3s ease;
}

.fixed-logo:hover {
    transform: scale(1.05);
    filter: drop-shadow(0 4px 20px rgba(0, 255, 255, 0.3));
}

.fixed-logo a {
    display: block;
    line-height: 0;
}

.fixed-logo img {
    height: 60px;
    width: auto;
    display: block;
}

/* Responsive sizing */
@media (max-width: 768px) {
    .fixed-logo {
        top: 15px;
        right: 15px;
    }
    
    .fixed-logo img {
        height: 50px;
    }
}

@media (max-width: 480px) {
    .fixed-logo {
        top: 10px;
        right: 10px;
    }
    
    .fixed-logo img {
        height: 40px;
    }
}
        /* Responsive */
        @media (max-width: 768px) {
            .viewer-container {
                top: 80px;
                bottom: 80px;
                left: 10px;
                right: 10px;
                gap: 10px;
            }

            .nav-title {
                font-size: 1.3rem;
            }

            .floating-controls {
                top: 10px;
                right: 10px;
            }

            .control-btn {
                width: 45px;
                height: 45px;
            }

            .zoom-controls {
                bottom: 10px;
                left: 10px;
                padding: 10px 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Fixed Logo -->
    <div class="fixed-logo">
        <a href="index.html">
            <img src="images/logo.png" alt="KLE Logo">
        </a>
    </div>

    <!-- Dock Navigation -->
     <div class="dock-outer">
  <div class="dock-panel">
    <!-- Home -->
    <a href="./index.html" class="dock-item">
      <div class="dock-icon"><span class="material-symbols-outlined">home</span></div>
      <div class="dock-label">Home</div>
    </a>
    
    <!-- Pitch -->
    <a href="./pitch.html" class="dock-item">
      <div class="dock-icon"><span class="material-symbols-outlined">airplanemode_active</span></div>
      <div class="dock-label">Pitch</div>
    </a>
    
    <!-- Software -->
    <a href="./dashboard.html" class="dock-item">
      <div class="dock-icon"><span class="material-symbols-outlined">code</span></div>
      <div class="dock-label">Software</div>
    </a>
    
    <!-- Flight Operations -->
    <a href="./operations.html" class="dock-item">
      <div class="dock-icon"><span class="material-symbols-outlined">flight_takeoff</span></div>
      <div class="dock-label">Flight Operations</div>
    </a>
    
    <!-- Technical -->
    <a href="./technical.html" class="dock-item">
      <div class="dock-icon"><span class="material-symbols-outlined">engineering</span></div>
      <div class="dock-label">Technical</div>
    </a>
    
    <!-- About Us -->
    <a href="./aboutus.html" class="dock-item">
      <div class="dock-icon"><span class="material-symbols-outlined">groups</span></div>
      <div class="dock-label">About Us</div>
    </a>
  </div>
  </div>

    <div class="viewer-container">
        <!-- Image Display Area -->
        <div class="image-wrapper" id="imageWrapper">
            <img src="images/draft.jpeg" alt="Mechanical Draft" class="main-image" id="mainImage">
            
            <!-- Floating Controls (Right Side) -->
            <div class="floating-controls">
                <button class="control-btn" onclick="downloadImage()" title="Download">
                    <span class="material-symbols-outlined">download</span>
                </button>
                <button class="control-btn" onclick="fullscreen()" title="Fullscreen">
                    <span class="material-symbols-outlined">fullscreen</span>
                </button>
            </div>

            <!-- Zoom Controls (Bottom Left) -->
            <div class="zoom-controls">
                <button class="zoom-btn" onclick="zoomOut()" title="Zoom Out">
                    <span class="material-symbols-outlined">remove</span>
                </button>
                <span class="zoom-level" id="zoomLevel">100%</span>
                <button class="zoom-btn" onclick="zoomIn()" title="Zoom In">
                    <span class="material-symbols-outlined">add</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentZoom = 100;
        const image = document.getElementById('mainImage');
        const zoomLevelDisplay = document.getElementById('zoomLevel');

        function zoomIn() {
            currentZoom += 10;
            if (currentZoom > 200) currentZoom = 200;
            updateZoom();
        }

        function zoomOut() {
            currentZoom -= 10;
            if (currentZoom < 50) currentZoom = 50;
            updateZoom();
        }

        function resetZoom() {
            currentZoom = 100;
            updateZoom();
        }

        function updateZoom() {
            image.style.transform = `scale(${currentZoom / 100})`;
            zoomLevelDisplay.textContent = `${currentZoom}%`;
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.href = image.src;
            link.download = 'mechanical-draft.png';
            link.click();
        }

        function fullscreen() {
            const wrapper = document.getElementById('imageWrapper');
            if (wrapper.requestFullscreen) {
                wrapper.requestFullscreen();
            } else if (wrapper.webkitRequestFullscreen) {
                wrapper.webkitRequestFullscreen();
            }
        }

        function closeViewer() {
            window.location.href = 'index.html';
        }

        // Pan image with mouse drag when zoomed
        let isDragging = false;
        let startX, startY, scrollLeft, scrollTop;
        const imageWrapper = document.getElementById('imageWrapper');

        imageWrapper.addEventListener('mousedown', (e) => {
            if (currentZoom > 100 && e.target === image) {
                isDragging = true;
                startX = e.pageX - imageWrapper.offsetLeft;
                startY = e.pageY - imageWrapper.offsetTop;
                scrollLeft = imageWrapper.scrollLeft;
                scrollTop = imageWrapper.scrollTop;
            }
        });

        imageWrapper.addEventListener('mouseleave', () => {
            isDragging = false;
        });

        imageWrapper.addEventListener('mouseup', () => {
            isDragging = false;
        });

        imageWrapper.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const x = e.pageX - imageWrapper.offsetLeft;
            const y = e.pageY - imageWrapper.offsetTop;
            const walkX = (x - startX) * 2;
            const walkY = (y - startY) * 2;
            imageWrapper.scrollLeft = scrollLeft - walkX;
            imageWrapper.scrollTop = scrollTop - walkY;
        });
    </script>

    <!-- Error Handling Script -->
    <script src="js/error-handling.js"></script>

    <!-- Accessibility Enhancements Script -->
    <script src="js/accessibility-enhancements.js"></script>
</body>
</html>
